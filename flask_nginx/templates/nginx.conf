{#-
    Note that the '# >>> generated by footprint' and '# <<< generated by footprint' comments are used to
    identify the footprint part of the nginx configuration file. This allows us to track changes made by footprint
    and avoid overwriting modifications to the nginx configuration file
    made by say -- certbot -- or other tools.

    See patch_nginx_conf() in flask_nginx/systemd/nginx.py for details.
-#}
server {
# >>> generated by footprint

    listen {{listen|default(80)}};
    listen [::]:{{listen|default(80)}};

    add_header Content-Security-Policy "upgrade-insecure-requests; frame-ancestors 'none';form-action 'self'" always;

    client_max_body_size {{client_max_body_size|default('4G')}};
    keepalive_timeout 5;

    root {{root}};
    index index.html;
    access_log /var/log/nginx/{{server_name|split|first}}-access.log{% if log_format is defined %} {{log_format}}{% endif %};

    server_name {{server_name}};

    {% for d, page in error_pages|default([]) -%}
    error_page {{page}} {{d.url or ''}}/{{page}}.html;
    location = {{d.url or ''}}/{{page}}.html {
        root {{d.folder}};
        internal;
    }
    {% endfor -%}

    {% if exclude_urls is defined and exclude_urls|length > 0 -%}
    location ~ ^/({{ exclude_urls|join('|') }}) {
        return 404;
    }
    {% endif -%}

    {% if toplevel is defined -%}
    location ~ ^/({{Config.top_level_files_re}})$ {
        root {{toplevel}};
        expires 10d;
        access_log {{access_log|default('off')}};
    }
    {%- endif -%}

    {% for s in staticdirs %}
    {% if s.url -%}
        location {{s.url}}
    {%- else -%}
        location ~ {{ root_location_match|default('(^/(img|images|js|css|media|docs|tutorials|notebooks|downloads|help|\.well-known)/|^favicon\.ico$)')}}
    {%- endif %} {
        {% if s.rewrite %}rewrite {{s.url}}/(.*) /$1 break;{% endif %}
        root  {{s.folder}};
        expires {{expires|default('off')}};
        access_log {{access_log|default('off')}};
        # Warning: using add_header ignores all add_header blocks from parent scopes!!!
        location ~ \.svgz$ { add_header Content-Encoding gzip; }
    }
    {%- endfor %}

    location {{prefix|default('/')}} {
        {% if routes is defined and routes|length > 0 -%}
        # Warning: this restricts access to any future paths added to the application.
        # If you want to allow access to any future paths, edit or remove this block.
        # It does, however, unload many 404 errors (produced by e.g. bots)
        # from the application to nginx, which is more efficient.
        if ($request_uri !~* ^/($|({{ routes|join('|') }}))) {
            return 404;
        }
        {% endif -%}
        proxy_pass         http://{% if host is defined %}{{host}}:{{port}}{% else %}unix:{{application_dir}}/app.sock{% endif %};
        proxy_redirect     off;
        # include /etc/nginx/proxy_params;
        proxy_set_header  Host              $http_host;
        proxy_set_header  X-Real-IP         $remote_addr;
        proxy_set_header  X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header  X-Forwarded-Proto $scheme;
        {{extra|default('')}}

        {%- if authentication is defined %}
            auth_basic "{{appname|title}} Area";
            # e.g:
            # echo -n "username:" > pw.txt
            # openssl passwd -apr1 >> pw.txt
            auth_basic_user_file "{{authentication|normpath}}";
        {%- endif %}
    }

# <<< generated by footprint
}
